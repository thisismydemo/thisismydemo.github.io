<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="380" fill="#f8fafc" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Hyper-V Backup Architecture — VSS Integration Flow</text>

  <defs>
    <marker id="bk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker>
    <marker id="gk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#16a34a"/></marker>
    <marker id="ok" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ea580c"/></marker>
  </defs>

  <!-- Backup Application -->
  <rect x="20" y="55" width="170" height="70" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="105" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Backup Application</text>
  <text x="105" y="98" text-anchor="middle" font-size="9" fill="#64748b">Veeam / Commvault / Rubrik</text>
  <text x="105" y="112" text-anchor="middle" font-size="9" fill="#64748b">HYCU / MABS</text>

  <!-- Step 1 arrow -->
  <line x1="190" y1="80" x2="248" y2="80" stroke="#2563eb" stroke-width="1.5" marker-end="url(#bk)"/>
  <text x="219" y="72" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">1</text>

  <!-- Hyper-V Host -->
  <rect x="250" y="45" width="290" height="195" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="395" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Hyper-V Host</text>

  <!-- VSS Writer -->
  <rect x="270" y="78" width="130" height="42" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="335" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Hyper-V VSS Writer</text>
  <text x="335" y="112" text-anchor="middle" font-size="9" fill="#64748b">Host-level coordination</text>

  <!-- RCT -->
  <rect x="270" y="128" width="130" height="36" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="335" y="146" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">RCT Engine</text>
  <text x="335" y="158" text-anchor="middle" font-size="9" fill="#64748b">Change tracking</text>

  <!-- VM inside host -->
  <rect x="418" y="78" width="108" height="100" rx="4" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="472" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">Running VM</text>

  <!-- Guest VSS inside VM -->
  <rect x="426" y="104" width="92" height="30" rx="3" fill="#f3e8ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="472" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#6b21a8">Guest VSS</text>
  <text x="472" y="128" text-anchor="middle" font-size="8" fill="#6b21a8">SQL/Exchange/AD</text>

  <!-- App writers inside guest -->
  <rect x="426" y="140" width="92" height="30" rx="3" fill="#f3e8ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="472" y="155" text-anchor="middle" font-size="9" fill="#6b21a8">App VSS Writers</text>
  <text x="472" y="165" text-anchor="middle" font-size="8" fill="#6b21a8">Flush buffers</text>

  <!-- VHDX files -->
  <rect x="270" y="175" width="250" height="30" rx="4" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
  <text x="395" y="194" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">VHDX + VMCX + VMGS (on CSV)</text>

  <!-- Step 2: VSS Writer → Guest VSS -->
  <line x1="400" y1="99" x2="418" y2="115" stroke="#16a34a" stroke-width="1.2" marker-end="url(#gk)"/>
  <text x="415" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">2</text>

  <!-- Step 3: Guest quiesces apps -->
  <text x="472" y="92" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">3 quiesce</text>

  <!-- Step 4: Shadow copy from VHDX -->
  <rect x="570" y="155" width="105" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="622" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Shadow Copy</text>
  <text x="622" y="190" text-anchor="middle" font-size="9" fill="#a16207">Point-in-time</text>

  <line x1="520" y1="190" x2="570" y2="180" stroke="#ea580c" stroke-width="1.2" marker-end="url(#ok)"/>
  <text x="545" y="182" text-anchor="middle" font-size="9" font-weight="600" fill="#ea580c">4</text>

  <!-- Step 5: Backup reads from shadow copy -->
  <line x1="622" y1="155" x2="622" y2="95" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="622" y1="95" x2="190" y2="95" stroke="#2563eb" stroke-width="1.2" marker-end="url(#bk)"/>
  <text x="622" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">5 read data</text>

  <!-- Backup Repository -->
  <rect x="20" y="260" width="170" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="105" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Backup Repository</text>
  <text x="105" y="300" text-anchor="middle" font-size="9" fill="#64748b">On-prem (NAS, disk, dedup)</text>

  <line x1="105" y1="125" x2="105" y2="260" stroke="#16a34a" stroke-width="1.5" marker-end="url(#gk)"/>
  <text x="95" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">6 store</text>

  <!-- Offsite / Cloud -->
  <rect x="230" y="260" width="170" height="55" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="315" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">Offsite / Cloud Vault</text>
  <text x="315" y="300" text-anchor="middle" font-size="9" fill="#64748b">Azure, S3, tape</text>

  <line x1="190" y1="287" x2="230" y2="287" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#bk)"/>
  <text x="210" y="280" text-anchor="middle" font-size="9" fill="#7c3aed">7 replicate</text>

  <!-- Consistency label -->
  <rect x="560" y="260" width="220" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="670" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#1e293b">Consistency Levels</text>
  <text x="670" y="300" text-anchor="middle" font-size="9" fill="#16a34a">&#9679; App-consistent: Guest VSS + app writers</text>
  <text x="670" y="316" text-anchor="middle" font-size="9" fill="#f59e0b">&#9679; Crash-consistent: No guest VSS</text>
  <text x="670" y="330" text-anchor="middle" font-size="9" fill="#64748b">(Linux w/o integration, legacy OS)</text>

  <!-- 3-2-1 label -->
  <rect x="440" y="260" width="105" height="55" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="492" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#c2410c">3-2-1 Rule</text>
  <text x="492" y="295" text-anchor="middle" font-size="9" fill="#9a3412">3 copies</text>
  <text x="492" y="307" text-anchor="middle" font-size="9" fill="#9a3412">2 media types</text>
  <text x="492" y="319" text-anchor="middle" font-size="9" fill="#9a3412">1 offsite</text>

  <!-- Flow numbers legend -->
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#64748b">1 Initiate → 2 Signal guest → 3 Quiesce apps → 4 Shadow copy → 5 Read data → 6 Store → 7 Replicate offsite</text>
</svg>
