<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" fill="#f8fafc" rx="8"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Cluster Set Architecture</text>

  <defs><marker id="cs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker></defs>

  <!-- Management Cluster -->
  <rect x="240" y="48" width="280" height="75" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Management Cluster</text>
  <text x="380" y="88" text-anchor="middle" font-size="10" fill="#64748b">CS-Master resource + Referral SOFS</text>
  <text x="380" y="104" text-anchor="middle" font-size="10" fill="#64748b">Unified namespace: \\ClusterSet\Share</text>

  <!-- Arrows down -->
  <line x1="230" y1="123" x2="130" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#cs)"/>
  <line x1="380" y1="123" x2="380" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#cs)"/>
  <line x1="530" y1="123" x2="630" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#cs)"/>

  <text x="170" y="148" text-anchor="middle" font-size="9" fill="#2563eb">CS-Worker</text>
  <text x="380" y="148" text-anchor="middle" font-size="9" fill="#2563eb">CS-Worker</text>
  <text x="590" y="148" text-anchor="middle" font-size="9" fill="#2563eb">CS-Worker</text>

  <!-- Member Cluster 1 -->
  <rect x="20" y="162" width="220" height="145" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="130" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Member Cluster A</text>
  <text x="130" y="197" text-anchor="middle" font-size="9" fill="#64748b">8 nodes — Production Tier 1</text>

  <rect x="35" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="80" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 1-4</text>
  <rect x="135" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="180" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 5-8</text>

  <rect x="35" y="248" width="190" height="24" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="130" y="264" text-anchor="middle" font-size="9" fill="#166534">SAN Storage + CSVs</text>

  <text x="130" y="296" text-anchor="middle" font-size="9" fill="#64748b">Independent failure domain</text>

  <!-- Member Cluster 2 -->
  <rect x="270" y="162" width="220" height="145" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Member Cluster B</text>
  <text x="380" y="197" text-anchor="middle" font-size="9" fill="#64748b">8 nodes — Production Tier 2</text>

  <rect x="285" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="330" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 1-4</text>
  <rect x="385" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="430" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 5-8</text>

  <rect x="285" y="248" width="190" height="24" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="380" y="264" text-anchor="middle" font-size="9" fill="#166534">SAN Storage + CSVs</text>

  <text x="380" y="296" text-anchor="middle" font-size="9" fill="#64748b">Independent failure domain</text>

  <!-- Member Cluster 3 -->
  <rect x="520" y="162" width="220" height="145" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="630" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Member Cluster C</text>
  <text x="630" y="197" text-anchor="middle" font-size="9" fill="#64748b">4 nodes — Dev/Test</text>

  <rect x="535" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="580" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 1-2</text>
  <rect x="635" y="208" width="90" height="30" rx="3" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="227" text-anchor="middle" font-size="9" fill="#1e293b">Nodes 3-4</text>

  <rect x="535" y="248" width="190" height="24" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="264" text-anchor="middle" font-size="9" fill="#166534">SAN Storage + CSVs</text>

  <text x="630" y="296" text-anchor="middle" font-size="9" fill="#64748b">Independent failure domain</text>

  <!-- Cross-cluster migration arrow -->
  <line x1="240" y1="230" x2="270" y2="230" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="490" y1="230" x2="520" y2="230" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="255" y="222" text-anchor="middle" font-size="8" fill="#f59e0b">Live</text>
  <text x="505" y="222" text-anchor="middle" font-size="8" fill="#f59e0b">Live</text>

  <!-- Features bar -->
  <rect x="20" y="325" width="720" height="42" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
  <text x="380" y="343" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">Cluster Set Capabilities</text>
  <text x="130" y="360" text-anchor="middle" font-size="9" fill="#1e293b">Cross-cluster live migration</text>
  <text x="330" y="360" text-anchor="middle" font-size="9" fill="#1e293b">Unified storage namespace</text>
  <text x="530" y="360" text-anchor="middle" font-size="9" fill="#1e293b">Fault domains + availability sets</text>
</svg>
