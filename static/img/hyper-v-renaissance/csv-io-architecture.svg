<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="440" fill="#f8fafc" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">CSV I/O Modes — Direct vs. Redirected</text>

  <!-- Left side: Direct I/O -->
  <rect x="15" y="50" width="370" height="375" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="200" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Direct I/O (Normal — High Performance)</text>

  <!-- Node A -->
  <rect x="35" y="90" width="150" height="60" rx="5" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Node A</text>
  <text x="110" y="130" text-anchor="middle" font-size="9" fill="#64748b">Coordinator</text>

  <!-- Node B -->
  <rect x="215" y="90" width="150" height="60" rx="5" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="290" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Node B</text>
  <text x="290" y="130" text-anchor="middle" font-size="9" fill="#64748b">Non-coordinator</text>

  <!-- SAN -->
  <rect x="95" y="250" width="210" height="55" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">SAN Array</text>
  <text x="200" y="292" text-anchor="middle" font-size="10" fill="#64748b">CSV LUNs (iSCSI / FC)</text>

  <!-- Direct arrows -->
  <line x1="110" y1="150" x2="160" y2="250" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="290" y1="150" x2="240" y2="250" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <defs><marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#16a34a"/></marker></defs>

  <text x="115" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Direct</text>
  <text x="115" y="213" text-anchor="middle" font-size="9" fill="#16a34a">SAN path</text>
  <text x="285" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Direct</text>
  <text x="285" y="213" text-anchor="middle" font-size="9" fill="#16a34a">SAN path</text>

  <text x="200" y="330" text-anchor="middle" font-size="10" fill="#166534">Both nodes access SAN directly</text>
  <text x="200" y="345" text-anchor="middle" font-size="10" fill="#166534">No cluster network involved for data I/O</text>
  <text x="200" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Best performance</text>
  <text x="200" y="385" text-anchor="middle" font-size="10" fill="#64748b">Requires: NTFS format, working storage paths</text>

  <!-- Right side: Redirected I/O -->
  <rect x="415" y="50" width="370" height="375" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="600" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Redirected I/O (Fallback — Degraded)</text>

  <!-- Node A (coordinator) -->
  <rect x="435" y="90" width="150" height="60" rx="5" fill="#fff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="510" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Node A</text>
  <text x="510" y="130" text-anchor="middle" font-size="9" fill="#64748b">Coordinator</text>

  <!-- Node B (lost path) -->
  <rect x="615" y="90" width="150" height="60" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="690" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Node B</text>
  <text x="690" y="130" text-anchor="middle" font-size="9" fill="#dc2626">Storage path LOST</text>

  <!-- SAN -->
  <rect x="495" y="250" width="210" height="55" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">SAN Array</text>
  <text x="600" y="292" text-anchor="middle" font-size="10" fill="#64748b">CSV LUNs (iSCSI / FC)</text>

  <!-- Redirect arrow: Node B → Node A (cluster network) -->
  <line x1="615" y1="120" x2="585" y2="120" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#dc2626"/></marker></defs>
  <text x="600" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">SMB 3.0</text>
  <text x="600" y="100" text-anchor="middle" font-size="9" fill="#dc2626">Cluster network</text>

  <!-- Node A → SAN -->
  <line x1="510" y1="150" x2="555" y2="250" stroke="#f59e0b" stroke-width="2" marker-end="url(#ay)"/>
  <defs><marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/></marker></defs>

  <!-- X on Node B → SAN -->
  <line x1="690" y1="150" x2="660" y2="220" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="685" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">✕</text>

  <text x="530" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">Proxied</text>
  <text x="530" y="223" text-anchor="middle" font-size="9" fill="#f59e0b">through coordinator</text>

  <text x="600" y="330" text-anchor="middle" font-size="10" fill="#991b1b">Node B routes I/O through Node A</text>
  <text x="600" y="345" text-anchor="middle" font-size="10" fill="#991b1b">Cluster network carries storage traffic</text>
  <text x="600" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Degraded performance</text>
  <text x="600" y="385" text-anchor="middle" font-size="10" fill="#64748b">Triggers: path loss, VSS snapshot, ReFS on SAN</text>
</svg>
