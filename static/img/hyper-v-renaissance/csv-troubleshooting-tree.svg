<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="750" height="420" fill="#f8fafc" rx="8"/>
  <text x="375" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">CSV Troubleshooting Decision Tree</text>

  <!-- Step 1 -->
  <rect x="255" y="48" width="240" height="40" rx="20" fill="#1e293b"/>
  <text x="375" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">1. Check CSV State</text>

  <line x1="325" y1="88" x2="180" y2="115" stroke="#64748b" stroke-width="1.2"/>
  <line x1="425" y1="88" x2="570" y2="115" stroke="#64748b" stroke-width="1.2"/>
  <text x="240" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Online + Direct</text>
  <text x="510" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Offline or Redirected</text>

  <!-- Online + Direct = OK -->
  <rect x="80" y="115" width="200" height="36" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="180" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Storage is healthy</text>

  <!-- Step 2: Why redirected? -->
  <rect x="450" y="115" width="240" height="40" rx="20" fill="#475569"/>
  <text x="570" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">2. Check Redirect Reason</text>

  <line x1="510" y1="155" x2="180" y2="195" stroke="#64748b" stroke-width="1.2"/>
  <line x1="570" y1="155" x2="450" y2="195" stroke="#64748b" stroke-width="1.2"/>
  <line x1="630" y1="155" x2="650" y2="195" stroke="#64748b" stroke-width="1.2"/>

  <text x="320" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Backup/VSS</text>
  <text x="500" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Path failure</text>
  <text x="655" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">ReFS on SAN</text>

  <!-- VSS = temporary -->
  <rect x="80" y="195" width="200" height="44" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">Temporary — wait for</text>
  <text x="180" y="230" text-anchor="middle" font-size="10" fill="#854d0e">backup to complete</text>

  <!-- Path failure → Step 3 -->
  <rect x="330" y="195" width="240" height="40" rx="20" fill="#475569"/>
  <text x="450" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">3. Check Storage Paths</text>

  <!-- ReFS = permanent -->
  <rect x="600" y="195" width="135" height="44" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="667" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Reformat CSV</text>
  <text x="667" y="230" text-anchor="middle" font-size="10" fill="#991b1b">as NTFS</text>

  <!-- Step 3 branches -->
  <line x1="390" y1="235" x2="200" y2="275" stroke="#64748b" stroke-width="1.2"/>
  <line x1="510" y1="235" x2="530" y2="275" stroke="#64748b" stroke-width="1.2"/>

  <text x="280" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">iSCSI sessions down</text>
  <text x="490" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">MPIO paths missing</text>

  <!-- iSCSI fix -->
  <rect x="70" y="275" width="260" height="52" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="200" y="295" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Check iSCSI service, target portal,</text>
  <text x="200" y="310" text-anchor="middle" font-size="10" fill="#1e40af">network connectivity (port 3260)</text>
  <text x="200" y="322" text-anchor="middle" font-size="9" fill="#64748b">Get-IscsiSession | Reconnect-IscsiTarget</text>

  <!-- MPIO fix -->
  <rect x="400" y="275" width="260" height="52" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="530" y="295" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Check MPIO paths, vendor DSM,</text>
  <text x="530" y="310" text-anchor="middle" font-size="10" fill="#1e40af">HBA firmware, switch zoning</text>
  <text x="530" y="322" text-anchor="middle" font-size="9" fill="#64748b">mpclaim -s -d | Check FC fabric</text>

  <!-- Step 4 -->
  <line x1="375" y1="335" x2="375" y2="355" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="205" y="355" width="340" height="40" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">4. Still redirected? Check cluster network health</text>

  <text x="375" y="410" text-anchor="middle" font-size="10" fill="#64748b">Get-ClusterNetwork | Verify Role 1 networks are Up</text>
</svg>
