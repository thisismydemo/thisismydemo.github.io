<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="300" fill="#f8fafc" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Three IaC Approaches for Hyper-V</text>

  <!-- Ansible -->
  <rect x="20" y="55" width="250" height="220" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="145" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Ansible</text>
  <text x="145" y="95" text-anchor="middle" font-size="10" fill="#dc2626">Configuration Management</text>

  <text x="35" y="118" font-size="10" fill="#1e293b">&#8226; WinRM/SSH to Windows hosts</text>
  <text x="35" y="135" font-size="10" fill="#1e293b">&#8226; microsoft.hyperv collection</text>
  <text x="35" y="152" font-size="10" fill="#1e293b">&#8226; dsc3 module (DSC v3 bridge)</text>
  <text x="35" y="169" font-size="10" fill="#1e293b">&#8226; Agentless — no install on targets</text>
  <text x="35" y="186" font-size="10" fill="#1e293b">&#8226; Stateless — checks every run</text>

  <rect x="35" y="200" width="220" height="30" rx="4" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="145" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Best for: config management + drift</text>

  <text x="145" y="255" text-anchor="middle" font-size="9" fill="#16a34a">Mature Windows support</text>
  <text x="145" y="268" text-anchor="middle" font-size="9" fill="#64748b">Cluster ops require win_powershell</text>

  <!-- Terraform + PowerShell -->
  <rect x="285" y="55" width="250" height="220" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">Terraform + PS/DSC</text>
  <text x="410" y="95" text-anchor="middle" font-size="10" fill="#7c3aed">Provisioning + Configuration</text>

  <text x="300" y="118" font-size="10" fill="#1e293b">&#8226; taliesins/hyperv provider</text>
  <text x="300" y="135" font-size="10" fill="#1e293b">&#8226; Creates VMs, switches, VHDs</text>
  <text x="300" y="152" font-size="10" fill="#1e293b">&#8226; remote-exec → DSC v3 configures</text>
  <text x="300" y="169" font-size="10" fill="#1e293b">&#8226; State file tracks all resources</text>
  <text x="300" y="186" font-size="10" fill="#1e293b">&#8226; Destroy workflow for cleanup</text>

  <rect x="300" y="200" width="220" height="30" rx="4" fill="#f3e8ff" stroke="#c4b5fd"/>
  <text x="410" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">Best for: declarative VM lifecycle</text>

  <text x="410" y="255" text-anchor="middle" font-size="9" fill="#f59e0b">Community provider — test first</text>
  <text x="410" y="268" text-anchor="middle" font-size="9" fill="#64748b">azurerm on Azure Local is enterprise</text>

  <!-- Terraform + Ansible -->
  <rect x="550" y="55" width="250" height="220" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="675" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Terraform + Ansible</text>
  <text x="675" y="95" text-anchor="middle" font-size="10" fill="#2563eb">Full IaC Pipeline</text>

  <text x="565" y="118" font-size="10" fill="#1e293b">&#8226; TF creates infrastructure</text>
  <text x="565" y="135" font-size="10" fill="#1e293b">&#8226; Ansible configures guests</text>
  <text x="565" y="152" font-size="10" fill="#1e293b">&#8226; Dynamic inventory from TF state</text>
  <text x="565" y="169" font-size="10" fill="#1e293b">&#8226; Separation of concerns</text>
  <text x="565" y="186" font-size="10" fill="#1e293b">&#8226; Multi-platform capable</text>

  <rect x="565" y="200" width="220" height="30" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="675" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Best for: large, multi-platform envs</text>

  <text x="675" y="255" text-anchor="middle" font-size="9" fill="#f59e0b">Two tools to maintain</text>
  <text x="675" y="268" text-anchor="middle" font-size="9" fill="#64748b">Overkill for small Hyper-V shops</text>
</svg>
