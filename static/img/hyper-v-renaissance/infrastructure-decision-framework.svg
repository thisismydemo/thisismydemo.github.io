<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="440" fill="#f8fafc" rx="8"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Infrastructure Decision Framework</text>

  <!-- Start -->
  <rect x="280" y="48" width="200" height="40" rx="20" fill="#1e293b"/>
  <text x="380" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Do you have an existing SAN?</text>

  <line x1="330" y1="88" x2="180" y2="125" stroke="#64748b" stroke-width="1.5"/>
  <line x1="430" y1="88" x2="580" y2="125" stroke="#64748b" stroke-width="1.5"/>
  <text x="240" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Yes</text>
  <text x="520" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">No</text>

  <!-- YES: Existing SAN -->
  <rect x="50" y="125" width="260" height="50" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="180" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Three-Tier Hyper-V</text>
  <text x="180" y="164" text-anchor="middle" font-size="10" fill="#64748b">Reuse SAN — lowest cost path</text>

  <!-- Sub-question for Yes -->
  <line x1="180" y1="175" x2="180" y2="200" stroke="#64748b" stroke-width="1"/>
  <rect x="60" y="200" width="240" height="36" rx="18" fill="#475569"/>
  <text x="180" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Need Azure cloud services?</text>

  <line x1="120" y1="236" x2="100" y2="265" stroke="#64748b" stroke-width="1"/>
  <line x1="240" y1="236" x2="260" y2="265" stroke="#64748b" stroke-width="1"/>
  <text x="100" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Yes</text>
  <text x="260" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">No</text>

  <rect x="20" y="265" width="160" height="44" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Add Azure Arc</text>
  <text x="100" y="300" text-anchor="middle" font-size="9" fill="#64748b">See Post 17</text>

  <rect x="200" y="265" width="160" height="44" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="280" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Pure on-prem</text>
  <text x="280" y="300" text-anchor="middle" font-size="9" fill="#64748b">No Azure needed</text>

  <!-- NO: No existing SAN -->
  <rect x="450" y="125" width="260" height="36" rx="18" fill="#475569"/>
  <text x="580" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Azure-first strategy?</text>

  <line x1="520" y1="161" x2="480" y2="195" stroke="#64748b" stroke-width="1.5"/>
  <line x1="640" y1="161" x2="680" y2="195" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="182" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">No</text>
  <text x="670" y="182" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Yes</text>

  <!-- No Azure strategy → S2D -->
  <rect x="380" y="195" width="200" height="50" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">S2D Hyper-V</text>
  <text x="480" y="234" text-anchor="middle" font-size="10" fill="#64748b">Perpetual license, no subscription</text>

  <!-- Yes Azure → need AKS/AVD? -->
  <rect x="600" y="195" width="150" height="36" rx="18" fill="#475569"/>
  <text x="675" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Need AKS or AVD?</text>

  <line x1="640" y1="231" x2="610" y2="265" stroke="#64748b" stroke-width="1"/>
  <line x1="710" y1="231" x2="710" y2="265" stroke="#64748b" stroke-width="1"/>
  <text x="618" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">No</text>
  <text x="718" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">Yes</text>

  <rect x="530" y="265" width="160" height="44" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="610" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">S2D + Azure Arc</text>
  <text x="610" y="300" text-anchor="middle" font-size="9" fill="#64748b">HCI without subscription</text>

  <rect x="630" y="265" width="120" height="44" rx="5" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="690" y="285" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">Azure Local</text>
  <text x="690" y="300" text-anchor="middle" font-size="9" fill="#64748b">Full Azure integration</text>

  <!-- Edge/ROBO callout -->
  <rect x="380" y="260" width="140" height="36" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
  <text x="450" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#854d0e">Edge / ROBO?</text>
  <text x="450" y="290" text-anchor="middle" font-size="9" fill="#854d0e">S2D 2-3 nodes</text>

  <!-- Bottom summary -->
  <rect x="20" y="330" width="720" height="95" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="380" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Summary</text>
  <rect x="40" y="362" width="10" height="10" fill="#16a34a" rx="2"/>
  <text x="55" y="372" font-size="10" fill="#1e293b"><tspan font-weight="600">Three-Tier:</tspan> Existing SAN → lowest cost, independent scaling, air-gap capable</text>
  <rect x="40" y="382" width="10" height="10" fill="#2563eb" rx="2"/>
  <text x="55" y="392" font-size="10" fill="#1e293b"><tspan font-weight="600">S2D:</tspan> No SAN, no subscription → hyperconverged simplicity, perpetual license</text>
  <rect x="40" y="402" width="10" height="10" fill="#7c3aed" rx="2"/>
  <text x="55" y="412" font-size="10" fill="#1e293b"><tspan font-weight="600">Azure Local:</tspan> Azure-first + AKS/AVD → full cloud integration, subscription model</text>
</svg>
