<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="360" fill="#f8fafc" rx="8"/>
  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Hyper-V Live Migration — Six Phases</text>

  <defs>
    <marker id="fa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker>
  </defs>

  <!-- Phase boxes -->
  <!-- Phase 1 -->
  <rect x="15" y="50" width="120" height="90" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="15" y="50" width="120" height="22" rx="5" fill="#2563eb"/>
  <text x="75" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1. Setup</text>
  <text x="75" y="86" text-anchor="middle" font-size="9" fill="#1e293b">Connect to</text>
  <text x="75" y="98" text-anchor="middle" font-size="9" fill="#1e293b">destination</text>
  <text x="75" y="114" text-anchor="middle" font-size="9" fill="#64748b">Create skeleton VM</text>
  <text x="75" y="126" text-anchor="middle" font-size="9" fill="#64748b">Allocate memory</text>

  <line x1="135" y1="95" x2="155" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Phase 2 -->
  <rect x="157" y="50" width="175" height="90" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="157" y="50" width="175" height="22" rx="5" fill="#16a34a"/>
  <text x="244" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2. Memory Pre-Copy</text>
  <text x="244" y="86" text-anchor="middle" font-size="9" fill="#1e293b">Copy full working set</text>
  <text x="244" y="98" text-anchor="middle" font-size="9" fill="#1e293b">Track dirty pages</text>
  <text x="244" y="114" text-anchor="middle" font-size="9" fill="#16a34a">Iterate: copy only changed</text>
  <text x="244" y="126" text-anchor="middle" font-size="9" fill="#16a34a">pages each round</text>

  <line x1="332" y1="95" x2="352" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Phase 3 -->
  <rect x="354" y="50" width="140" height="90" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="354" y="50" width="140" height="22" rx="5" fill="#dc2626"/>
  <text x="424" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3. Final Transfer</text>
  <text x="424" y="86" text-anchor="middle" font-size="9" fill="#991b1b">VM PAUSED</text>
  <text x="424" y="98" text-anchor="middle" font-size="9" fill="#1e293b">Transfer remaining</text>
  <text x="424" y="110" text-anchor="middle" font-size="9" fill="#1e293b">dirty pages + CPU state</text>
  <text x="424" y="126" text-anchor="middle" font-size="9" fill="#dc2626">Blackout: 1-2 seconds</text>

  <line x1="494" y1="95" x2="514" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Phase 4 -->
  <rect x="516" y="50" width="120" height="90" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <rect x="516" y="50" width="120" height="22" rx="5" fill="#854d0e"/>
  <text x="576" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4. Storage</text>
  <text x="576" y="86" text-anchor="middle" font-size="9" fill="#1e293b">Transfer storage</text>
  <text x="576" y="98" text-anchor="middle" font-size="9" fill="#1e293b">handle control</text>
  <text x="576" y="114" text-anchor="middle" font-size="9" fill="#64748b">Fast on CSV</text>
  <text x="576" y="126" text-anchor="middle" font-size="9" fill="#64748b">(shared storage)</text>

  <line x1="636" y1="95" x2="656" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Phase 5 -->
  <rect x="658" y="50" width="90" height="90" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="658" y="50" width="90" height="22" rx="5" fill="#16a34a"/>
  <text x="703" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5. Online</text>
  <text x="703" y="86" text-anchor="middle" font-size="9" fill="#16a34a">VM resumes</text>
  <text x="703" y="98" text-anchor="middle" font-size="9" fill="#16a34a">on destination</text>
  <text x="703" y="114" text-anchor="middle" font-size="9" fill="#64748b">Clock updated</text>

  <line x1="748" y1="95" x2="768" y2="95" stroke="#2563eb" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Phase 6 -->
  <rect x="770" y="50" width="75" height="90" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="770" y="50" width="75" height="22" rx="5" fill="#93c5fd"/>
  <text x="807" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">6. ARP</text>
  <text x="807" y="86" text-anchor="middle" font-size="9" fill="#1e293b">Gratuitous</text>
  <text x="807" y="98" text-anchor="middle" font-size="9" fill="#1e293b">ARP update</text>
  <text x="807" y="114" text-anchor="middle" font-size="9" fill="#64748b">Switch learns</text>
  <text x="807" y="126" text-anchor="middle" font-size="9" fill="#64748b">new port</text>

  <!-- Timeline bar -->
  <rect x="15" y="160" width="830" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="15" y="160" width="120" height="8" rx="4" fill="#2563eb" opacity="0.3"/>
  <rect x="157" y="160" width="175" height="8" rx="4" fill="#16a34a" opacity="0.5"/>
  <rect x="354" y="160" width="140" height="8" rx="4" fill="#dc2626" opacity="0.5"/>
  <rect x="516" y="160" width="120" height="8" rx="4" fill="#facc15" opacity="0.4"/>
  <rect x="658" y="160" width="90" height="8" rx="4" fill="#16a34a" opacity="0.3"/>
  <rect x="770" y="160" width="75" height="8" rx="4" fill="#93c5fd" opacity="0.3"/>

  <text x="244" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Majority of time spent here</text>
  <text x="424" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Only downtime</text>

  <!-- Source/Destination labels -->
  <rect x="15" y="205" width="400" height="55" rx="5" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="215" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Source Host</text>
  <text x="215" y="243" text-anchor="middle" font-size="10" fill="#64748b">VM runs here during phases 1-3. Paused during phase 3.</text>

  <rect x="445" y="205" width="400" height="55" rx="5" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="645" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Destination Host</text>
  <text x="645" y="243" text-anchor="middle" font-size="10" fill="#64748b">VM resumes here after phase 5. No user-visible interruption.</text>

  <!-- WS2025 improvements bar -->
  <rect x="15" y="275" width="830" height="70" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
  <text x="430" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Windows Server 2025 Improvements</text>
  <text x="140" y="318" text-anchor="middle" font-size="9" fill="#1e293b">LZ4 Compression</text>
  <text x="140" y="332" text-anchor="middle" font-size="9" fill="#64748b">Faster than WS2022</text>
  <text x="320" y="318" text-anchor="middle" font-size="9" fill="#1e293b">RDMA Offload (SMB Direct)</text>
  <text x="320" y="332" text-anchor="middle" font-size="9" fill="#64748b">Near-zero CPU</text>
  <text x="500" y="318" text-anchor="middle" font-size="9" fill="#1e293b">Dynamic Proc. Compat.</text>
  <text x="500" y="332" text-anchor="middle" font-size="9" fill="#64748b">Auto CPU feature negotiation</text>
  <text x="680" y="318" text-anchor="middle" font-size="9" fill="#1e293b">GPU-P Live Migration</text>
  <text x="680" y="332" text-anchor="middle" font-size="9" fill="#64748b">New: GPU VMs can migrate</text>
</svg>
