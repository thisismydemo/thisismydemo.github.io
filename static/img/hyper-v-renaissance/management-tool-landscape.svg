  <text x="250" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Free</text>
  <text x="355" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Free</text>
  <text x="460" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Free</text>
  <text x="565" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Free</text>
  <text x="670" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">SC License</text>
  <text x="780" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Free</text>

  <!-- Legend -->
  <rect x="15" y="445" width="830" height="28" rx="4" fill="#f1f5f9"/>
  <text x="35" y="463" font-size="12" fill="#16a34a">●</text>
  <text x="50" y="463" font-size="10" fill="#475569">Full support</text>
  <text x="150" y="463" font-size="12" fill="#f59e0b">◐</text>
  <text x="165" y="463" font-size="10" fill="#475569">Partial / basic</text>
  <text x="280" y="463" font-size="12" fill="#dc2626">○</text>
  <text x="295" y="463" font-size="10" fill="#475569">Not available</text>
  <text x="430" y="463" font-size="10" fill="#475569">vMode column reflects Public Preview status — GA targeted Q2 2026</text>
