  <text x="250" y="122" text-anchor="middle" font-size="14" fill="#16a34a">●</text>
  <text x="355" y="122" text-anchor="middle" font-size="14" fill="#dc2626">○</text>
  <text x="460" y="122" text-anchor="middle" font-size="14" fill="#16a34a">●</text>
  <text x="565" y="122" text-anchor="middle" font-size="14" fill="#16a34a">●</text>
  <text x="670" y="122" text-anchor="middle" font-size="14" fill="#16a34a">●</text>
  <text x="780" y="122" text-anchor="middle" font-size="14" fill="#16a34a">●</text>

