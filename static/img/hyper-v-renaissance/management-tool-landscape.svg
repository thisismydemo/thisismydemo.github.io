  <text x="250" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Manager</text>

  <rect x="305" y="58" width="100" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="355" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Failover</text>
  <text x="355" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">Cluster Mgr</text>

  <rect x="410" y="58" width="100" height="40" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="460" y="75" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">WAC</text>
  <text x="460" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">aMode</text>

