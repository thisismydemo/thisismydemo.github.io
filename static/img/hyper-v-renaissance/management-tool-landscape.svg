  <text x="460" y="287" text-anchor="middle" font-size="14" fill="#dc2626">○</text>
  <text x="565" y="287" text-anchor="middle" font-size="14" fill="#dc2626">○</text>
  <text x="670" y="287" text-anchor="middle" font-size="14" fill="#16a34a">●</text>
