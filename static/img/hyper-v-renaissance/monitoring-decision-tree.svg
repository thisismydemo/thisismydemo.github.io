<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="580" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Monitoring Platform Decision Tree</text>

  <!-- START node -->
  <rect x="310" y="50" width="200" height="44" rx="22" fill="#1e293b" stroke="none"/>
  <text x="410" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">How many Hyper-V hosts?</text>

  <!-- Branch lines from START -->
  <line x1="350" y1="94" x2="150" y2="140" stroke="#64748b" stroke-width="1.5"/>
  <line x1="410" y1="94" x2="410" y2="140" stroke="#64748b" stroke-width="1.5"/>
  <line x1="470" y1="94" x2="670" y2="140" stroke="#64748b" stroke-width="1.5"/>

  <!-- Branch labels -->
  <text x="230" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">&lt; 5 hosts</text>
  <text x="410" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">5–20 hosts</text>
  <text x="590" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">20+ hosts</text>

  <!-- SMALL: < 5 hosts -->
  <rect x="40" y="140" width="220" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Prometheus + Grafana</text>
  <text x="150" y="178" text-anchor="middle" font-size="10" fill="#64748b">Free, lightweight, effective</text>

  <line x1="150" y1="190" x2="150" y2="216" stroke="#64748b" stroke-width="1"/>
  <text x="150" y="210" text-anchor="middle" font-size="10" fill="#64748b">or</text>

  <rect x="40" y="218" width="220" height="50" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">PowerShell Scripts</text>
  <text x="150" y="256" text-anchor="middle" font-size="10" fill="#64748b">Scheduled health checks (free)</text>

  <!-- MID: 5-20 hosts decision -->
  <rect x="290" y="140" width="240" height="44" rx="22" fill="#475569" stroke="none"/>
  <text x="410" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Team culture?</text>

  <line x1="350" y1="184" x2="280" y2="230" stroke="#64748b" stroke-width="1.5"/>
  <line x1="470" y1="184" x2="540" y2="230" stroke="#64748b" stroke-width="1.5"/>

  <text x="300" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">DevOps / SRE</text>
  <text x="520" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Windows / System Center</text>

  <!-- Mid-left: Prometheus -->
  <rect x="180" y="230" width="200" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="280" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Prometheus + Grafana</text>
  <text x="280" y="268" text-anchor="middle" font-size="10" fill="#64748b">Open source, self-hosted</text>

  <!-- Mid-right: SCOM -->
  <rect x="440" y="230" width="200" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="540" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">SCOM</text>
  <text x="540" y="268" text-anchor="middle" font-size="10" fill="#64748b">Integrated with System Center</text>

  <!-- LARGE: 20+ hosts -->
  <rect x="570" y="140" width="210" height="44" rx="22" fill="#475569" stroke="none"/>
  <text x="675" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Existing investment?</text>

  <line x1="620" y1="184" x2="590" y2="230" stroke="#64748b" stroke-width="1.5"/>
  <line x1="730" y1="184" x2="750" y2="230" stroke="#64748b" stroke-width="1.5"/>

  <text x="590" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">System Center</text>
  <text x="750" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Open source</text>

  <rect x="490" y="230" width="200" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <!-- reusing mid-right SCOM box position, separate for large -->

  <rect x="660" y="230" width="140" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="730" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Prometheus</text>
  <text x="730" y="268" text-anchor="middle" font-size="10" fill="#64748b">+ Thanos at scale</text>

  <!-- === ADDITIVE QUESTIONS === -->
  <line x1="410" y1="300" x2="410" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="160" y="320" width="500" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="347" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Already invested in Azure?</text>

  <line x1="290" y1="364" x2="220" y2="395" stroke="#64748b" stroke-width="1.2"/>
  <line x1="530" y1="364" x2="600" y2="395" stroke="#64748b" stroke-width="1.2"/>
  <text x="240" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">No</text>
  <text x="580" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Yes</text>

  <rect x="100" y="395" width="240" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="220" y="414" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Stay on-prem</text>
  <text x="220" y="430" text-anchor="middle" font-size="10" fill="#64748b">SCOM or Prometheus — done</text>

  <rect x="480" y="395" width="260" height="44" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610" y="414" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">Add Azure Monitor</text>
  <text x="610" y="430" text-anchor="middle" font-size="10" fill="#64748b">Alongside on-prem solution</text>

  <!-- Compliance question -->
  <line x1="410" y1="445" x2="410" y2="465" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="180" y="465" width="460" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="492" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Need compliance audit trails &amp; reporting?</text>

  <line x1="290" y1="509" x2="220" y2="535" stroke="#64748b" stroke-width="1.2"/>
  <line x1="530" y1="509" x2="600" y2="535" stroke="#64748b" stroke-width="1.2"/>
  <text x="240" y="526" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">No</text>
  <text x="580" y="526" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Yes</text>

  <rect x="100" y="535" width="240" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="220" y="558" text-anchor="middle" font-size="11" fill="#475569">Any platform works</text>

  <rect x="480" y="535" width="260" height="36" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="610" y="558" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">SCOM (SSRS reporting)</text>
</svg>
