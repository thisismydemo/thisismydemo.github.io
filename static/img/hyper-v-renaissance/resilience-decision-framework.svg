<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="500" fill="#f8fafc" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Multi-Site Resilience — Technology Decision Framework</text>

  <!-- Start -->
  <rect x="310" y="48" width="200" height="40" rx="20" fill="#1e293b"/>
  <text x="410" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">What's your RPO requirement?</text>

  <!-- RPO branches -->
  <line x1="340" y1="88" x2="130" y2="125" stroke="#64748b" stroke-width="1.5"/>
  <line x1="410" y1="88" x2="410" y2="125" stroke="#64748b" stroke-width="1.5"/>
  <line x1="480" y1="88" x2="690" y2="125" stroke="#64748b" stroke-width="1.5"/>

  <text x="220" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Zero data loss</text>
  <text x="410" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">Seconds to minutes</text>
  <text x="600" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#ea580c">Minutes (5-15)</text>

  <!-- Zero RPO path -->
  <rect x="30" y="125" width="200" height="40" rx="20" fill="#475569"/>
  <text x="130" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Site distance?</text>

  <line x1="80" y1="165" x2="80" y2="200" stroke="#64748b" stroke-width="1.2"/>
  <line x1="180" y1="165" x2="180" y2="200" stroke="#64748b" stroke-width="1.2"/>
  <text x="80" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Same campus</text>
  <text x="180" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Metro (&lt;35km)</text>

  <!-- Campus Clusters -->
  <rect x="15" y="200" width="130" height="55" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="80" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Campus Clusters</text>
  <text x="80" y="237" text-anchor="middle" font-size="9" fill="#64748b">S2D + RLNM</text>
  <text x="80" y="249" text-anchor="middle" font-size="9" fill="#16a34a">Free (Datacenter ed.)</text>

  <!-- Storage Replica Sync -->
  <rect x="155" y="200" width="130" height="55" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="220" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Storage Replica</text>
  <text x="220" y="237" text-anchor="middle" font-size="9" fill="#64748b">Synchronous mode</text>
  <text x="220" y="249" text-anchor="middle" font-size="9" fill="#2563eb">Free (Datacenter ed.)</text>

  <!-- Near-zero RPO path -->
  <rect x="310" y="125" width="200" height="40" rx="20" fill="#475569"/>
  <text x="410" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Have enterprise SAN?</text>

  <line x1="360" y1="165" x2="340" y2="200" stroke="#64748b" stroke-width="1.2"/>
  <line x1="460" y1="165" x2="480" y2="200" stroke="#64748b" stroke-width="1.2"/>
  <text x="340" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">Yes</text>
  <text x="480" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">No</text>

  <!-- SAN Replication -->
  <rect x="270" y="200" width="140" height="55" rx="5" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">SAN Replication</text>
  <text x="340" y="237" text-anchor="middle" font-size="9" fill="#64748b">ActiveDR / SnapMirror</text>
  <text x="340" y="249" text-anchor="middle" font-size="9" fill="#854d0e">Array-included</text>

  <!-- Storage Replica Async -->
  <rect x="420" y="200" width="140" height="55" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="490" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Storage Replica</text>
  <text x="490" y="237" text-anchor="middle" font-size="9" fill="#64748b">Asynchronous mode</text>
  <text x="490" y="249" text-anchor="middle" font-size="9" fill="#2563eb">Free (Datacenter ed.)</text>

  <!-- Minutes RPO path -->
  <rect x="590" y="125" width="200" height="55" rx="5" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="690" y="147" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">Hyper-V Replica</text>
  <text x="690" y="162" text-anchor="middle" font-size="9" fill="#64748b">30s / 5min / 15min intervals</text>
  <text x="690" y="174" text-anchor="middle" font-size="9" fill="#6b21a8">Free (all editions)</text>

  <!-- Automatic failover question -->
  <line x1="410" y1="270" x2="410" y2="300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="210" y="300" width="400" height="40" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="325" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Need automatic failover (no human intervention)?</text>

  <line x1="310" y1="340" x2="230" y2="375" stroke="#64748b" stroke-width="1.2"/>
  <line x1="510" y1="340" x2="590" y2="375" stroke="#64748b" stroke-width="1.2"/>
  <text x="260" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">Yes</text>
  <text x="560" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">No (manual OK)</text>

  <!-- Stretched cluster -->
  <rect x="100" y="375" width="260" height="50" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="230" y="397" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Stretched Cluster + Storage Replica (sync)</text>
  <text x="230" y="413" text-anchor="middle" font-size="9" fill="#64748b">or Campus Cluster (RLNM) for same-campus</text>

  <!-- Manual failover options -->
  <rect x="460" y="375" width="290" height="50" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="605" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Hyper-V Replica / SAN Replication /</text>
  <text x="605" y="413" text-anchor="middle" font-size="10" fill="#475569">Storage Replica (cluster-to-cluster or server-to-server)</text>

  <!-- Cost legend -->
  <rect x="15" y="445" width="790" height="44" rx="4" fill="#f1f5f9"/>
  <text x="30" y="464" font-size="10" font-weight="600" fill="#1e293b">Cost:</text>
  <rect x="70" y="455" width="10" height="10" fill="#16a34a" rx="2"/>
  <text x="85" y="464" font-size="9" fill="#475569">Hyper-V Replica = Free (all editions)</text>
  <rect x="280" y="455" width="10" height="10" fill="#2563eb" rx="2"/>
  <text x="295" y="464" font-size="9" fill="#475569">Storage Replica / Campus = Datacenter edition</text>
  <rect x="530" y="455" width="10" height="10" fill="#facc15" rx="2"/>
  <text x="545" y="464" font-size="9" fill="#475569">SAN Replication = Often included with array</text>
  <text x="30" y="482" font-size="9" fill="#64748b">All Windows Server features require no additional licensing beyond the edition. SAN replication cost varies by vendor — many include it with the array.</text>
</svg>
